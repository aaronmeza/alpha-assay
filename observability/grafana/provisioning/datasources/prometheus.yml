#
# Grafana datasource provisioning. Points at the internal prometheus
# service name on the alphaassay_observability network.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
