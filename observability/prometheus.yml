#
# Prometheus config. Two scrape jobs:
#   - paper-trader: the heartbeat stub (replaces it with the
#     real IBKR paper-trader). Exposes /metrics on internal port 8000.
#   - breadth-recorder: profile-gated in docker-compose.yml; wires
#     this up. Until then, Prometheus will log scrape errors, which is fine.
#
# 15s scrape interval matches the spec Section 6 cadence.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: paper-dryrun
    stack: alphaassay

scrape_configs:
  # Targets use host.docker.internal so this scrape config works whether
  # the scraped container runs on the alphaassay_observability bridge
  # network OR on network_mode: host (which loses bridge-DNS but binds
  # the metrics port on the host's interface). The prometheus service
  # gets `extra_hosts: host.docker.internal:host-gateway` in compose so
  # Linux Docker resolves the name to the bridge gateway IP.
  - job_name: paper-trader
    honor_labels: true
    static_configs:
      - targets:
          - host.docker.internal:8000
        labels:
          service: paper-trader
          component: engine

  - job_name: breadth-recorder
    honor_labels: true
    static_configs:
      - targets:
          - host.docker.internal:8001
        labels:
          service: breadth-recorder
          component: recorder

  - job_name: es-bars-recorder
    honor_labels: true
    static_configs:
      - targets:
          - host.docker.internal:8002
        labels:
          service: es-bars-recorder
          component: recorder
